name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build bundled croc binary
        run: bash tool/build_croc_android.sh

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Build release APK (arm64 only — smaller for Obtainium)
        run: flutter build apk --release --target-platform android-arm64

      - name: Prepare release assets
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          fi
          VERSION_CODE=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f2)
          APK=build/app/outputs/flutter-apk/app-release.apk
          cp "$APK" "gator-${VERSION}-arm64-v8a.apk"
          cp "$APK" gator-arm64-v8a.apk
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          ls -lh gator-*.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gator-*-arm64-v8a.apk
            gator-arm64-v8a.apk
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Prepare GitHub Pages site
        run: bash tool/prepare_pages_site.sh gator-arm64-v8a.apk "$VERSION" "$VERSION_CODE" site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4