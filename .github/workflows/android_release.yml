name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build bundled croc binary
        run: bash tool/build_croc_android.sh

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses

      - name: Install dependencies
        run: flutter pub get

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is not set — releases will not be upgradable." >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/gator-release.keystore
          KEY_PASS="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASS}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=gator-release.keystore
          EOF

      - name: Test
        run: flutter test

      - name: Build release APK (arm64 only — smaller for Obtainium)
        run: flutter build apk --release --target-platform android-arm64

      - name: Prepare release assets
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          fi
          VERSION_CODE=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f2)
          APK=build/app/outputs/flutter-apk/app-release.apk
          cp "$APK" "gator-${VERSION}-arm64-v8a.apk"
          cp "$APK" gator-arm64-v8a.apk
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          ls -lh gator-*.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gator-*-arm64-v8a.apk
            gator-arm64-v8a.apk
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Prepare GitHub Pages site
        run: bash tool/prepare_pages_site.sh gator-arm64-v8a.apk "$VERSION" "$VERSION_CODE" site

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false